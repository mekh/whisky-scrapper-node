version: '3.9'

services:
  service:
    container_name: whisky-be
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - APP_PORT=4000
      - APP_HOST=0.0.0.0
      - VALKEY_HOST=whisky-valkey
      - VALKEY_PORT=6379
      - VALKEY_DB=0
      - DB_LOGGING=false
      - DB_HOST=whisky-db
      - DB_PORT=5432
      - DB_NAME=whisky
      - DB_USER=user
      - DB_PASS=<SECRET>
      - DB_SLOW_QUERY_MS=2500
      - JWT_ACCESS_SECRET=<SECRET>
      - LOG_LEVEL=trace
      - LOG_JSON=false
      - LOG_PRETTY=false
      - LOG_CALLSITES=false
      - LOG_COLORS=true
    ports:
      - '4000:4000'
    networks:
      - whisky-be
      - whisky-db
      - whisky-valkey
    restart: unless-stopped

networks:
  whisky-be:
    name: whisky-be
  whisky-db:
    external: true
  whisky-valkey:
    external: true
